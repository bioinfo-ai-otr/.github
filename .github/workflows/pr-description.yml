name: PR Description

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  validate:
    name: Validate PR description
    runs-on: ubuntu-latest
    steps:
      - name: Check required sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          node <<'NODE'
          const requiredSections = ['目的', '现象', '想法', '思路', '实现'];
          const body = (process.env.PR_BODY ?? '').replace(/<!--[\s\S]*?-->/g, '');
          const headings = [...body.matchAll(/^[ \t]*##[ \t]+(.+?)[ \t]*$/gm)];
          const failures = [];
          let previousHeadingIndex = -1;

          for (const section of requiredSections) {
            const headingIndex = headings.findIndex((match) => match[1].trim() === section);
            if (headingIndex === -1) {
              failures.push(`缺少“## ${section}”章节`);
              continue;
            }
            if (headingIndex <= previousHeadingIndex) {
              failures.push(`“## ${section}”章节顺序不正确`);
            }

            const match = headings[headingIndex];
            const contentStart = match.index + match[0].length;
            const contentEnd = headings[headingIndex + 1]?.index ?? body.length;
            if (body.slice(contentStart, contentEnd).trim().length === 0) {
              failures.push(`“## ${section}”章节没有正文`);
            }
            previousHeadingIndex = headingIndex;
          }

          if (failures.length > 0) {
            for (const failure of failures) {
              console.error(`::error::${failure}`);
            }
            process.exit(1);
          }

          console.log('PR 描述包含全部必填章节，且每个章节都有正文。');
          NODE
